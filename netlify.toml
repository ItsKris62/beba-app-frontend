[build]
  command = "pnpm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION  = "20"
  PNPM_VERSION  = "9"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-cypress"

  [plugins.inputs]
    spec    = "cypress/e2e/**/*.cy.ts"
    browser = "electron"
    record  = false
