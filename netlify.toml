[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-cypress"

  [plugins.inputs]
    start   = "npm run start"
    wait-on = "http://localhost:3000"
    spec    = "cypress/e2e/**/*.cy.ts"
    browser = "chrome"
    record  = false
